name: Night City Audit

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Seção para auditar (deixe vazio para auditar tudo)'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 0'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Rodar auditoria
        env:
          AUDIT_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          AUDIT_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
        run: npm run audit
        continue-on-error: true

      - name: Upload relatório
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: audit-report
          path: reports/
          retention-days: 30
