name: Night City Checks

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run project checks
        run: node scripts/check.cjs

      - name: Install test dependencies
        run: npm ci

      - name: Install Playwright media dependencies
        run: npx playwright install ffmpeg

      - name: Run bughunt E2E
        run: npm run bughunt
        env:
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}
